name: CI + Auto Deploy

on:
  push:
    branches-ignore: [main]

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36'

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile instrumented tests
        working-directory: app-under-test/antennapod
        run: |
          chmod +x gradlew
          ./gradlew :app:compilePlayDebugAndroidTestSources

      - name: Compile unit tests
        working-directory: app-under-test/antennapod
        run: ./gradlew :app:compilePlayDebugUnitTestSources

      - name: Run unit tests
        working-directory: app-under-test/antennapod
        run: ./gradlew :app:testPlayDebugUnitTest

      - name: Check docs
        run: |
          OUR_TEST_DIR="app-under-test/antennapod/app/src"
          OUR_PKG="de/danoeh/antennapod"

          echo "--- @author in our test .kt files ---"
          MISSING=$(grep -rL "@author" --include="*.kt" \
            "$OUR_TEST_DIR/androidTest/java/$OUR_PKG/" \
            "$OUR_TEST_DIR/test/java/$OUR_PKG/" 2>/dev/null || true)
          if [ -n "$MISSING" ]; then
            echo "ERROR: Test files missing @author:"
            echo "$MISSING"
            exit 1
          fi
          echo "OK: all test files have @author."

          echo "--- Test file naming: TC<NNN>_*Test.kt ---"
          BAD_NAME=$(find "$OUR_TEST_DIR" -name "*.kt" \
            ! -name "TestHelper.kt" \
            ! -name "TC010_FirstLaunchUserFlow.kt" \
            ! -name "TC[0-9][0-9][0-9]_*Test.kt" || true)
          if [ -n "$BAD_NAME" ]; then
            echo "ERROR: Files not matching TC<NNN>_NameTest.kt:"
            echo "$BAD_NAME"
            exit 1
          fi
          echo "OK: all test files follow naming convention."

          echo "All doc checks passed."

  merge:
    needs: compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Squash and push to main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          BRANCH="${{ github.ref_name }}"
          TITLE=$(git log -1 --format=%s)

          git config user.name "CI Bot"
          git config user.email "ci@localhost"

          git fetch origin main
          git checkout -B main origin/main
          git merge --squash "$BRANCH"
          git commit -m "$TITLE" -m "Squashed from \`$BRANCH\`. CI passed."
          git push origin main

          # Clean up remote branch
          git push origin --delete "$BRANCH" 2>/dev/null || true
          echo "Done. Merged into main, branch deleted."
