name: Auto PR & Merge

on:
  push:
    branches: ['tc/**']

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR and auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -e
          BRANCH="${{ github.ref_name }}"
          echo "Branch: $BRANCH"

          # Skip if this is the main branch (shouldn't happen, but safe)
          if [ "$BRANCH" = "main" ]; then
            echo "On main branch, nothing to do."
            exit 0
          fi

          # Create PR
          echo "Creating PR for $BRANCH ..."
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Auto PR: $BRANCH" \
            --body "Automated PR from branch \`$BRANCH\`.")

          echo "PR created: $PR_URL"
          sleep 3

          # Squash-merge
          echo "Merging $BRANCH into main..."
          gh pr merge "$BRANCH" --squash --delete-branch

          echo "Done. Branch deleted, changes merged into main."
