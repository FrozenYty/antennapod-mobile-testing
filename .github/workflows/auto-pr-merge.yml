name: Auto PR & Merge

on:
  push:
    branches: ['tc/**']

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR and auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "Branch: $BRANCH"

          # Create PR (idempotent — won't duplicate if already exists)
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Auto PR: $BRANCH" \
            --body "Automated PR from branch \`$BRANCH\`." \
            --label "auto-merge" \
            2>/dev/null || echo "PR may already exist, continuing..."

          # Wait a moment for PR to be fully created
          sleep 5

          # Squash-merge into main (no review required, no merge commit)
          gh pr merge "$BRANCH" --squash --delete-branch --admin \
            2>&1 || echo "Merge may have failed (check branch protection settings)"
