name: Auto PR & Merge

on:
  workflow_run:
    workflows: ["CI Compile Check"]
    types: [completed]
    branches: ['tc/**']

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check CI result
        run: |
          if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
            echo "CI did not pass (conclusion: ${{ github.event.workflow_run.conclusion }}). Aborting merge."
            exit 1
          fi
          echo "CI passed. Proceeding with auto-merge."

      - name: Create PR and auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -e
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          echo "Branch: $BRANCH"

          # Create PR
          echo "Creating PR for $BRANCH ..."
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Auto PR: $BRANCH" \
            --body "Automated PR from branch \`$BRANCH\`.")

          echo "PR created: $PR_URL"
          sleep 3

          # Squash-merge
          echo "Merging $BRANCH into main..."
          gh pr merge "$BRANCH" --squash --delete-branch

          echo "Done. Branch deleted, changes merged into main."
